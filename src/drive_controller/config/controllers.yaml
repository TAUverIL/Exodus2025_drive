controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Main drive controller
    drive_controller:
      type: velocity_controllers/JointGroupVelocityController

    # Pivot controller
    pivot_controller:
      type: position_controllers/JointGroupPositionController

# Config for main drive
drive_controller:
  ros__parameters:
    joints:
      - wheel1
      - wheel2
      - wheel3
      - wheel4
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity

# Config for pivots
pivot_controller:
  ros__parameters:
    joints:
      - pivot_right
      - pivot_left
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity